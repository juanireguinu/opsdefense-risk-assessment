<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Risk Assessment - OpsDefense v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#534AB7;--plite:#EEEDFE;--pdark:#3C3489;--teal:#1D9E75;--tlite:#E1F5EE;--tdark:#085041;--coral:#D85A30;--clite:#FAECE7;--cdark:#712B13;--red:#E24B4A;--rlite:#FCEBEB;--rdark:#791F1F;--rtext:#A32D2D;--amber:#BA7517;--alite:#FAEEDA;--adark:#633806;--atext:#854F0B;--blue:#378ADD;--blite:#E6F1FB;--green:#1D9E75;--glite:#EAF3DE;--gdark:#27500A;--gtext:#3B6D11;--g50:#F7F6F3;--g100:#EDEDEA;--g200:#D3D1C7;--g400:#888780;--g600:#5F5E5A;--g800:#2C2C2A;--bg:#fff;--bg2:#F7F6F3;--tx:#1A1A18;--tx2:#5F5E5A;--tx3:#888780;--brd:#E8E6E1;--r:10px;--rl:14px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;justify-content:center;padding:24px 16px}
.wrap{width:100%;max-width:520px}
.header{text-align:center;margin-bottom:24px}
.logo{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--teal));margin-bottom:10px}
.logo svg{width:22px;height:22px}
h1{font-size:20px;font-weight:600;margin-bottom:2px}
.sub{font-size:13px;color:var(--tx3)}
.progress{display:flex;gap:4px;margin-bottom:20px}
.pbar{height:4px;border-radius:2px;flex:1;background:var(--g100);transition:background .4s}
.pbar.done{background:var(--teal)}
.pbar.active{background:var(--purple)}
.step-num{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--purple);margin-bottom:4px}
.step-title{font-size:18px;font-weight:600;margin-bottom:4px}
.step-hint{font-size:13px;color:var(--tx3);line-height:1.55;margin-bottom:16px;font-style:italic}
.field{margin-bottom:18px}
.field-label{font-size:14px;font-weight:500;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.field-hint{font-size:12px;color:var(--tx3);margin-bottom:8px;line-height:1.5;font-style:italic}
.tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.tag-pop{background:var(--plite);color:var(--pdark)}
.tag-swe{background:var(--tlite);color:var(--tdark)}
.tag-any{background:var(--g50);color:var(--g600)}
select,input[type=text],textarea{width:100%;padding:10px 14px;border:1.5px solid var(--brd);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--tx);background:var(--bg);transition:border-color .2s;outline:none;appearance:none}
select{background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23888780' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:36px;cursor:pointer}
select:focus,input:focus,textarea:focus{border-color:var(--purple)}
textarea{resize:vertical;min-height:72px}
.example{font-size:11px;color:var(--tx3);margin-top:5px;padding-left:10px;border-left:2px solid var(--g100);line-height:1.5}
.flag-warn{font-size:11px;font-weight:500;margin-top:6px;padding:5px 10px;border-radius:6px}
.flag-red{background:var(--rlite);color:var(--rdark)}
.flag-amber{background:var(--alite);color:var(--adark)}
.important-marker{border-left:3px solid var(--teal);padding-left:16px;border-radius:0}
.cb-group{display:flex;flex-direction:column;gap:4px}
.cb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;background:var(--bg2);cursor:pointer;font-size:13px;border:1.5px solid transparent;transition:all .15s}
.cb-item:hover{background:var(--g100)}
.cb-item.checked{background:var(--alite);border-color:var(--amber)}
.cb-item input{accent-color:var(--amber);width:16px;height:16px;cursor:pointer}
.btns{display:flex;gap:10px;margin-top:24px}
.btn{flex:1;padding:12px 16px;border-radius:var(--r);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:all .2s;text-align:center}
.btn-back{background:var(--bg2);color:var(--tx2)}
.btn-back:hover{background:var(--g100)}
.btn-next{background:var(--purple);color:#fff}
.btn-next:hover{background:#4840A0}
.btn-next:disabled{opacity:.4;cursor:not-allowed}
.btn-score{background:linear-gradient(135deg,var(--purple),var(--teal));color:#fff;font-size:15px;padding:14px}
.btn-score:hover{opacity:.92}
.btn-score:disabled{opacity:.4;cursor:not-allowed}
.btn-new{background:var(--bg2);color:var(--tx2);width:100%;margin-top:12px;padding:12px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.btn-new:hover{background:var(--g100)}
.mode-grid{display:grid;gap:10px;margin-bottom:16px}
.mode-card{background:var(--bg);border:1.5px solid var(--brd);border-radius:var(--rl);padding:16px 20px;cursor:pointer;transition:all .2s;text-align:left}
.mode-card:hover{border-color:var(--purple);background:var(--plite)}
.mode-card h3{font-size:15px;font-weight:600;margin-bottom:4px}
.mode-card p{font-size:12px;color:var(--tx3);line-height:1.5}
.mode-badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.mb-purple{background:var(--plite);color:var(--pdark)}
.mb-teal{background:var(--tlite);color:var(--tdark)}
.mb-gray{background:var(--g50);color:var(--g600)}
.locked-card{background:var(--bg2);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;border:1px dashed var(--brd)}
.locked-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:8px}
.locked-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--tx2)}
.locked-row span:first-child{color:var(--tx3)}
.result-card{border-radius:var(--rl);padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%;border-radius:14px 0 0 14px}
.result-high{background:var(--rlite)}.result-high::before{background:var(--red)}
.result-mid{background:var(--alite)}.result-mid::before{background:var(--amber)}
.result-low{background:var(--glite)}.result-low::before{background:var(--green)}
.result-chip{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.chip-high{background:#E24B4A20;color:var(--rdark)}.chip-mid{background:#BA751720;color:var(--adark)}.chip-low{background:#1D9E7520;color:var(--gdark)}
.result-tier{font-size:28px;font-weight:600;margin-bottom:4px}
.tier-high{color:var(--rdark)}.tier-mid{color:var(--adark)}.tier-low{color:var(--gdark)}
.result-name{font-size:14px;font-weight:500;margin-bottom:12px}
.rname-high{color:var(--rtext)}.rname-mid{color:var(--atext)}.rname-low{color:var(--gtext)}
.result-reasoning{font-size:13px;line-height:1.65}
.rr-high{color:var(--rtext)}.rr-mid{color:var(--atext)}.rr-low{color:var(--gtext)}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.metric{background:var(--bg2);border-radius:var(--r);padding:12px 14px}
.metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:3px}
.metric-value{font-size:15px;font-weight:600}
.section-block{margin-bottom:14px}
.section-block-title{font-size:13px;font-weight:600;margin-bottom:6px}
.agenda-item{font-size:13px;color:var(--tx2);padding:7px 12px;border-left:2px solid var(--purple);margin-bottom:5px;line-height:1.5;background:var(--plite);border-radius:0 6px 6px 0}
.modifier-item{font-size:13px;padding:7px 12px;background:var(--alite);color:var(--adark);border-radius:6px;margin-bottom:5px;border:1px solid #BA751720}
.flag-item{font-size:13px;padding:7px 12px;background:var(--rlite);color:var(--rdark);border-radius:6px;margin-bottom:5px}
.export-section{margin-top:16px}
.export-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.export-title{font-size:13px;font-weight:600}
.btn-copy{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;border:1.5px solid var(--brd);background:var(--bg);color:var(--tx2);transition:all .2s}
.btn-copy:hover{background:var(--bg2)}
.btn-copy.copied{background:var(--tlite);color:var(--tdark);border-color:var(--teal)}
.export-box{background:var(--bg2);border-radius:var(--r);padding:14px 16px;font-size:11px;font-family:'SF Mono',Consolas,monospace;white-space:pre-wrap;line-height:1.6;max-height:300px;overflow-y:auto;border:1px solid var(--brd)}
.autonomy-grid{display:grid;grid-template-columns:80px 1fr;gap:4px 12px;font-size:12px;margin-top:8px}
.autonomy-phase{font-weight:600;padding:4px 0}
.autonomy-level{color:var(--tx2);padding:4px 0}
.lens-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.lens-card{border-radius:var(--r);padding:12px 14px}
.lens-card h4{font-size:12px;font-weight:600;margin-bottom:2px}
.lens-card .tier-val{font-size:18px;font-weight:600}
.lens-pops{background:var(--plite)}
.lens-pops h4{color:var(--pdark)}
.lens-swe{background:var(--tlite)}
.lens-swe h4{color:var(--tdark)}
.divergence{background:var(--alite);border:1px solid #BA751720;border-radius:var(--r);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--adark)}
.divergence-title{font-weight:600;margin-bottom:4px;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.match-badge{background:var(--glite);color:var(--gdark);border-radius:var(--r);padding:10px 16px;margin-bottom:16px;font-size:13px;font-weight:500;text-align:center}
.solo-badge{background:var(--alite);color:var(--adark);border-radius:var(--r);padding:8px 12px;margin-bottom:12px;font-size:12px;text-align:center}
.search-results{margin-top:12px}
.search-item{background:var(--bg);border:1.5px solid var(--brd);border-radius:var(--r);padding:12px 16px;cursor:pointer;transition:all .2s;margin-bottom:6px}
.search-item:hover{border-color:var(--teal);background:var(--tlite)}
.search-item h4{font-size:14px;font-weight:500;margin-bottom:2px}
.search-item p{font-size:12px;color:var(--tx3)}
.spinner{display:inline-block;width:24px;height:24px;border:2.5px solid var(--g100);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{text-align:center;padding:40px 0}
.error-box{background:var(--rlite);border:1px solid #E24B4A30;border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--rdark)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ============================================================
// CONFIGURATION — Replace with your Apps Script URL
// ============================================================
var API_URL = "https://script.google.com/a/macros/nubank.com.br/s/AKfycbyhPZDRI_y5mNY9RrvjgRaGG1hXXCYiI8COLOdk4Vssu3Cbg-OYoJLWxuPfaUPXun7W/exec";

// ============================================================
// STATE
// ============================================================
var S = {
  phase:"landing", mode:null, step:0, role:"",
  form:{betName:"",summary:"",role:"",audience:"",regulatory:"",financial:"",rollback:"",spec:"",domain:"",test:"",verify:"",pii:"",contractual:"",firstTime:"",confidence:"",uncertaintyNotes:"",opportunities:[],timeSink:""},
  partner:null, searchQuery:"", searchResults:[], selectedPartner:null,
  result:null, error:null, saving:false
};

function $(id){return document.getElementById(id)}
function h(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function resetState(){
  S={phase:"landing",mode:null,step:0,role:"",form:{betName:"",summary:"",role:"",audience:"",regulatory:"",financial:"",rollback:"",spec:"",domain:"",test:"",verify:"",pii:"",contractual:"",firstTime:"",confidence:"",uncertaintyNotes:"",opportunities:[],timeSink:""},partner:null,searchQuery:"",searchResults:[],selectedPartner:null,result:null,error:null,saving:false};
  render();
}

// ============================================================
// API
// ============================================================
function apiCall(data,cb){
  if(API_URL==="YOUR_APPS_SCRIPT_URL_HERE"){cb({error:"API URL not configured. See setup guide."});return;}
  fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(data),redirect:"follow"}).then(function(r){return r.text()}).then(function(t){
    try{cb(JSON.parse(t))}catch(e){cb({error:"Invalid response from server"})}
  }).catch(function(e){cb({error:"Network error: "+e.message})});
}
function apiSearch(query,cb){
  if(API_URL==="YOUR_APPS_SCRIPT_URL_HERE"){cb({results:[]});return;}
  fetch(API_URL+"?action=search&query="+encodeURIComponent(query),{redirect:"follow"}).then(function(r){return r.text()}).then(function(t){
    try{cb(JSON.parse(t))}catch(e){cb({results:[]})}
  }).catch(function(){cb({results:[]})});
}

// ============================================================
// SCORING ENGINE (same as v1)
// ============================================================
function computeScore(f){
  var r={tier:"",reasoning:[],agenda:[],flags:[],modifiers:[],probScore:0,probLabel:"",impactCol:"",baseTier:"",levels:{}};
  if(f.pii==="yes"){r.tier="High";r.reasoning.push("PII flag triggered: AI tools will interact with real customer data. Forces High risk.");r.flags.push("PII exposure requires data handling review.");r.agenda.push("Confirm data safeguards before AI tooling is configured.");return fin(r);}
  if(f.contractual==="yes"){r.tier="High";r.reasoning.push("Contractual obligation flag: external deliverable expectations. Forces High risk.");r.flags.push("Review contractual terms for AI-related restrictions.");r.agenda.push("Check if contracts restrict AI-assisted development.");return fin(r);}
  var colR={Operational:1,Financial:2,Reputational:3,Regulatory:4},maxC=0,cR=[];
  var auM={internal:"Operational",partners:"Financial",customer:"Reputational",public:"Reputational"};
  if(f.audience){var ac=auM[f.audience]||"Operational";maxC=Math.max(maxC,colR[ac]);cR.push("Audience ("+f.audience+") maps to "+ac+".");}
  if(f.regulatory==="yes"||f.regulatory==="unsure"){maxC=Math.max(maxC,colR.Regulatory);cR.push("Regulatory "+(f.regulatory==="unsure"?"uncertain (treated as yes)":"confirmed")+".");}
  if(f.financial==="direct"){maxC=Math.max(maxC,colR.Financial);cR.push("Direct financial exposure.");}
  else if(f.financial==="indirect"){maxC=Math.max(maxC,colR.Financial);cR.push("Indirect financial exposure.");}
  if(f.rollback==="migration"){maxC=Math.min(4,maxC+1);cR.push("Rollback requires migration (+1).");}
  else if(f.rollback==="irreversible"){maxC=Math.min(4,maxC+2);cR.push("Rollback irreversible (+2).");}
  if(maxC===0)maxC=1;
  var cN={1:"Operational",2:"Financial",3:"Reputational",4:"Regulatory"};r.impactCol=cN[maxC];
  var vM={obvious:1,careful:2,run_it:3},dM={familiar:1,mostly:2,new:3},sM={clear:1,mostly:2,exploring:3},tM={yes:1,partial:2,no:3};
  var vS=vM[f.verify]||2,dS=dM[f.domain]||2,sS=sM[f.spec]||2,tS=tM[f.test]||2;
  var avg=vS*.35+dS*.25+sS*.2+tS*.2;r.probScore=Math.round(avg*100)/100;
  r.probLabel=avg<=1.5?"Low":avg<=2.2?"Medium":"High";
  var mx={"Low-Operational":"Low","Low-Financial":"Low","Low-Reputational":"Mid","Low-Regulatory":"Mid","Medium-Operational":"Low","Medium-Financial":"Mid","Medium-Reputational":"High","Medium-Regulatory":"High","High-Operational":"Mid","High-Financial":"High","High-Reputational":"High","High-Regulatory":"High"};
  r.baseTier=mx[r.probLabel+"-"+r.impactCol]||"Mid";
  var tN={Low:1,Mid:2,High:3},tL={1:"Low",2:"Mid",3:"High"},cur=tN[r.baseTier];
  if(f.firstTime==="yes"){var b=Math.min(3,cur+1);if(b!==cur){r.modifiers.push("First-time pattern: "+tL[cur]+" to "+tL[b]);cur=b;}}
  if(f.confidence==="guessing"){var b2=Math.min(3,cur+1);if(b2!==cur){r.modifiers.push("Low confidence: "+tL[cur]+" to "+tL[b2]);cur=b2;}}
  r.tier=tL[cur];
  r.reasoning.push("Impact: "+r.impactCol+" ("+cR.join(" ")+")");
  r.reasoning.push("Probability: "+r.probLabel+" ("+r.probScore+"/3.00). "+(vS>=2?"Verifiability is key driver.":"Output is straightforward to verify."));
  r.reasoning.push("Matrix ["+r.probLabel+" x "+r.impactCol+"] = base tier "+r.baseTier+".");
  if(r.modifiers.length)r.reasoning.push("Modifiers: "+r.modifiers.join(" "));
  if(f.regulatory==="unsure")r.agenda.push("Confirm regulatory status before classification is final.");
  if(f.confidence==="guessing"||f.confidence==="mostly")r.agenda.push("Review uncertainty notes before confirming tier.");
  if(f.uncertaintyNotes)r.agenda.push("Uncertainty: "+f.uncertaintyNotes);
  if(vS===3)r.agenda.push("AI output is hard to verify. Discuss review strategy.");
  if(f.spec==="exploring")r.agenda.push("Requirements still exploratory. Consider deferring AI until Define firms up.");
  if(!r.agenda.length)r.agenda.push("No flags. Standard review: confirm tier and AI autonomy levels.");
  return fin(r);
}
function fin(r){
  var lv={High:{Discover:"L0-L1 (AI assists, never drafts)",Define:"L0-L1 (AI suggests, human authors)",Develop:"L2 max (AI drafts, line-by-line review)",Deliver:"L1 (AI supports, human executes)"},Mid:{Discover:"L2 (AI drafts, human validates)",Define:"L1-L2 (AI challenges, drafts specs)",Develop:"L2-L3 (AI generates, PR-level review)",Deliver:"L2-L3 (AI executes checklist, human reviews)"},Low:{Discover:"L2-L3 (AI drives, human spot-checks)",Define:"L2-L3 (AI generates, human reviews)",Develop:"L3 (AI implements, PR-level review)",Deliver:"L3 (AI executes, human reviews failures)"}};
  r.levels=lv[r.tier]||lv.Mid;r.range=r.tier==="High"?"L0-L2 (Human-led)":r.tier==="Mid"?"L1-L3 (AI drafts, human validates)":"L2-L3 (AI executes, human spot-checks)";return r;
}

// ============================================================
// RENDER
// ============================================================
function render(){$("app").innerHTML=renderPage();bindAll();}
function renderPage(){
  var o='<div class="header"><div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><h1>AI risk assessment</h1><p class="sub">OpsDefense v2.0 — Split assessment</p></div>';
  if(S.phase==="landing")return o+renderLanding();
  if(S.phase==="loading")return o+renderLoading();
  if(S.phase==="result")return o+renderResult();
  return o+renderWizard();
}

function renderLanding(){
  return '<div class="mode-grid"><div class="mode-card" onclick="startMode(\'new\')"><div class="mode-badge mb-purple">Recommended</div><h3>Start new assessment</h3><p>I am the first to assess this bet. My partner will add their lens later.</p></div><div class="mode-card" onclick="startMode(\'continue\')"><div class="mode-badge mb-teal">Continue</div><h3>Add my lens to a partner\'s assessment</h3><p>My partner already started. I will search for the bet and add my perspective.</p></div><div class="mode-card" onclick="startMode(\'solo\')"><div class="mode-badge mb-gray">Solo</div><h3>Solo assessment</h3><p>I will answer all questions myself. Flagged as single-lens in the export.</p></div></div><p style="font-size:12px;color:var(--tx3);text-align:center">Split assessment is recommended. Each role answers only their expertise area.</p>';
}

function renderLoading(){return '<div class="loading-center"><div class="spinner"></div><p style="margin-top:16px;font-size:14px;font-weight:500">Saving to assessment registry...</p><p style="font-size:13px;color:var(--tx3)">Writing to Google Sheets. This may take a few seconds on first load.</p></div>';}

// ============================================================
// WIZARD RENDERING
// ============================================================
function renderWizard(){
  var totalSteps=4,o='';
  o+='<div class="progress">';for(var i=0;i<totalSteps;i++){o+='<div class="pbar '+(i<S.step?"done":i===S.step?"active":"")+'"></div>';}o+='</div>';
  o+='<div class="step-num">Step '+(S.step+1)+' of '+totalSteps+'</div>';
  if(S.mode==="new")o+=renderNewStep();
  else if(S.mode==="continue")o+=renderContinueStep();
  else o+=renderSoloStep();
  if(S.error)o+='<div class="error-box">'+h(S.error)+'</div>';
  o+='<div class="btns">';
  if(S.step>0)o+='<button class="btn btn-back" onclick="goBack()">Back</button>';
  if(S.step<3)o+='<button class="btn btn-next" id="bn" onclick="goNext()">Next</button>';
  else{
    if(S.mode==="new")o+='<button class="btn btn-score" id="bn" onclick="saveNew()">Save and notify partner</button>';
    else if(S.mode==="continue")o+='<button class="btn btn-score" id="bn" onclick="saveComplete()">Score merged assessment</button>';
    else o+='<button class="btn btn-score" id="bn" onclick="saveSolo()">Score this bet</button>';
  }
  o+='</div>';
  o+='<button class="btn-new" onclick="resetState()">Start over</button>';
  return o;
}

// --- NEW PATH ---

  o+='<div class="section-block"><div class="section-block-title">Ceremony agenda</div>';for(var j=0;j<r.agenda.length;j++)o+='<div class="agenda-item">'+h(r.agenda[j])+'</div>';o+='</div>';

  o+='<div class="section-block"><div class="section-block-title">AI autonomy levels</div><div class="autonomy-grid"><div class="autonomy-phase">Discover</div><div class="autonomy-level">'+r.levels.Discover+'</div><div class="autonomy-phase">Define</div><div class="autonomy-level">'+r.levels.Define+'</div><div class="autonomy-phase">Develop</div><div class="autonomy-level">'+r.levels.Develop+'</div><div class="autonomy-phase">Deliver</div><div class="autonomy-level">'+r.levels.Deliver+'</div></div></div>';
  var exp=genExport();

// ============================================================
// HELPERS
// ============================================================
function tag(t){return '<span class="tag tag-'+({POps:"pop",SWE:"swe"}[t]||"any")+'">'+t+'</span>';}
function field(label,name,tg,hint,type,ph){
  return '<div class="field"><div class="field-label">'+label+' '+tag(tg)+'</div>'+(hint?'<div class="field-hint">'+hint+'</div>':'')+'<input type="text" data-field="'+name+'" value="'+h(S.form[name])+'" placeholder="'+h(ph||"")+'"></div>';
}
function sel(name,opts){
  var v=S.form[name],o='<select data-field="'+name+'">';
  for(var i=0;i<opts.length;i++)o+='<option value="'+h(opts[i][0])+'"'+(opts[i][0]===v?' selected':'')+'>'+h(opts[i][1])+'</option>';
  return o+'</select>';
}
function selEx(name,opts){
  var v=S.form[name],o='<select data-field="'+name+'">';
  for(var i=0;i<opts.length;i++)o+='<option value="'+h(opts[i][0])+'"'+(opts[i][0]===v?' selected':'')+'>'+h(opts[i][1])+'</option>';
  o+='</select>';
  for(var j=0;j<opts.length;j++){if(opts[j][0]===v&&opts[j][2])o+='<div class="example">'+h(opts[j][2])+'</div>';}
  return o;
}
function mergeForScore(){
  var f={};for(var k in S.form)f[k]=S.form[k];return f;
}
function mergeWithPartner(){
  var f={};for(var k in S.form)f[k]=S.form[k];
  if(S.selectedPartner){
    var p=S.selectedPartner;
    if(p.audience)f.audience=p.audience;if(p.regulatory)f.regulatory=p.regulatory;
    if(p.financial)f.financial=p.financial;if(p.spec)f.spec=p.spec;
    if(p.rollback)f.rollback=p.rollback;if(p.domain)f.domain=p.domain;
    if(p.test)f.test=p.test;if(p.verify)f.verify=p.verify;
    if(p.pii)f.pii=p.pii;if(p.contractual)f.contractual=p.contractual;
    if(p.firstTime)f.firstTime=p.firstTime;
  }
  return f;
}

// ============================================================
// EXPORT
// ============================================================
function genExport(){
  var r=S.result,f=S.form,d=new Date().toISOString().split("T")[0],sep=Array(56).join("=");
  var auL={internal:"Internal only",partners:"Internal + partners",customer:"Customer-facing",public:"Public"};
  var reL={no:"No",yes:"Yes",unsure:"Unsure (treated as Yes)"};
  var fiL={none:"None",indirect:"Indirect",direct:"Direct"};
  var roL={flag:"Feature flag",deploy:"Deploy revert",migration:"Data migration",irreversible:"Irreversible"};
  var doL={familiar:"Well-trodden",mostly:"Mostly familiar",new:"New territory"};
  var spL={clear:"Crystal clear",mostly:"Mostly clear",exploring:"Exploring"};
  var teL={yes:"Deterministic",partial:"Partial",no:"Hard to validate"};
  var veL={obvious:"Obvious",careful:"Careful review",run_it:"Must run it"};
  var full=S.mode==="continue"?mergeWithPartner():f;
  var mode=S.mode==="solo"?"SOLO":"SPLIT ("+((S.selectedPartner||{}).firstRole||f.role)+" + "+(S.mode==="continue"?f.role:"partner pending")+")";
  var lines=[sep,"AI RISK ASSESSMENT -- "+(f.betName||"[Bet name]"),"Assessed: "+d+" | Mode: "+mode,sep,"","CLASSIFICATION: "+r.tier.toUpperCase()+" RISK","AI autonomy range: "+r.range,"","SCORING SUMMARY"];
  for(var i=0;i<r.reasoning.length;i++)lines.push("  "+r.reasoning[i]);
  lines.push("","KEY INPUTS","  Audience: "+(auL[full.audience]||"--"),"  Regulatory: "+(reL[full.regulatory]||"--"),"  Financial: "+(fiL[full.financial]||"--"),"  Rollback: "+(roL[full.rollback]||"--"),"  Domain: "+(doL[full.domain]||"--"),"  Spec: "+(spL[full.spec]||"--"),"  Testability: "+(teL[full.test]||"--"),"  Verifiability: "+(veL[full.verify]||"--"));
  lines.push("","RED FLAGS","  PII: "+(full.pii==="yes"?"YES TRIGGERED":"No"),"  Contractual: "+(full.contractual==="yes"?"YES TRIGGERED":"No"),"  First-time: "+(full.firstTime==="yes"?"Yes (+1)":"No"));
  if(S.mode==="continue"&&r.popsTier)lines.push("","DUAL LENS","  POps tier: "+(r.popsTier||"--"),"  SWE tier: "+(r.sweTier||"--"),"  Match: "+(r.tiersMatch?"YES":"NO"));
  lines.push("","CONFIDENCE: "+(f.confidence||"--"),"UNCERTAINTY: "+(f.uncertaintyNotes||"None"));
  lines.push("","CEREMONY NOTES (fill at ceremony)","  Attendees: ___","  Decision: ___","  Action items:","  - ___");
  lines.push("","AI AUTONOMY LEVELS","  Discover: "+r.levels.Discover,"  Define:   "+r.levels.Define,"  Develop:  "+r.levels.Develop,"  Deliver:  "+r.levels.Deliver);
  lines.push("",sep,"Methodology: OpsDefense v1.0 | Scoring: v1 | Tool: v2.0 (split assessment)",sep);
  return lines.join("\n");
}

function startMode(m){S.mode=m;S.phase="form";S.step=0;render();}
function goNext(){
  if(S.mode==="continue"&&S.step===0&&!S.selectedPartner){S.error="Select an assessment first.";render();return;}
  S.error=null;S.step++;render();window.scrollTo(0,0);
}
function goBack(){S.error=null;if(S.step>0){S.step--;render();}else{resetState();}window.scrollTo(0,0);}

function saveNew(){
  S.phase="loading";render();
  var d={action:"create",betName:S.form.betName,summary:S.form.summary,role:S.form.role,audience:S.form.audience,regulatory:S.form.regulatory,financial:S.form.financial,spec:S.form.spec,rollback:S.form.rollback,domain:S.form.domain,test:S.form.test,verify:S.form.verify,pii:S.form.pii,contractual:S.form.contractual,firstTime:S.form.firstTime,confidence:S.form.confidence,uncertaintyNotes:S.form.uncertaintyNotes,preliminaryTier:S.form.preliminaryTier||""};
  apiCall(d,function(res){
    if(res.error){S.error=res.error;S.phase="form";S.step=3;render();return;}
    S.result=computeScore(mergeForScore());
    S.result.assessmentId=res.assessmentId;
    S.result.savedForPartner=true;
    S.phase="result";render();window.scrollTo(0,0);
  });
}
function saveComplete(){
  S.phase="loading";render();
  var p=S.selectedPartner;
  var myLens=mergeForScore();var mySc=computeScore(myLens);
  var full=mergeWithPartner();var fullSc=computeScore(full);
  var d={action:"complete",assessmentId:p.assessmentId,role:S.form.role,audience:S.form.audience,regulatory:S.form.regulatory,financial:S.form.financial,spec:S.form.spec,rollback:S.form.rollback,domain:S.form.domain,test:S.form.test,verify:S.form.verify,confidence:S.form.confidence,uncertaintyNotes:S.form.uncertaintyNotes,popsTier:S.form.role==="POps"?mySc.tier:"",sweTier:S.form.role==="SWE"?mySc.tier:""};
  apiCall(d,function(res){
    if(res.error){S.error=res.error;S.phase="form";S.step=3;render();return;}
    S.result=fullSc;
    S.result.popsTier=res.popsTier||p.popsTier||"";
    S.result.sweTier=res.sweTier||p.sweTier||"";
    S.result.tiersMatch=res.tiersMatch;
    S.result.assessmentId=res.assessmentId;
    S.phase="result";render();window.scrollTo(0,0);
  });
}
function saveSolo(){
  S.phase="loading";render();
  var sc=computeScore(mergeForScore());
  var d={action:"solo",betName:S.form.betName,summary:S.form.summary,role:S.form.role,audience:S.form.audience,regulatory:S.form.regulatory,financial:S.form.financial,spec:S.form.spec,rollback:S.form.rollback,domain:S.form.domain,test:S.form.test,verify:S.form.verify,pii:S.form.pii,contractual:S.form.contractual,firstTime:S.form.firstTime,confidence:S.form.confidence,uncertaintyNotes:S.form.uncertaintyNotes,tier:sc.tier};
  apiCall(d,function(res){
    if(res.error){S.error=res.error;S.phase="form";S.step=3;render();return;}
    S.result=sc;S.result.assessmentId=res.assessmentId;
    S.phase="result";render();window.scrollTo(0,0);
  });
}

function selectPartner(idx){S.selectedPartner=S.searchResults[idx];render();}

var searchTimer=null;
function doSearch(q){
  S.searchQuery=q;S.selectedPartner=null;
  clearTimeout(searchTimer);
  if(q.length<2){S.searchResults=[];render();return;}
  searchTimer=setTimeout(function(){
    apiSearch(q,function(res){S.searchResults=res.results||[];render();var sb=$("searchBox");if(sb){sb.value=q;sb.focus();}});
  },400);
}

function doCopy(){
  var t=genExport();navigator.clipboard.writeText(t).then(function(){var b=$("bcopy");b.textContent="Copied!";b.classList.add("copied");setTimeout(function(){b.textContent="Copy";b.classList.remove("copied");},2500);});
}

// ============================================================
// BINDING
// ============================================================
function bindAll(){
  document.querySelectorAll("[data-field]").forEach(function(el){
    var f=el.getAttribute("data-field");
    if(f==="searchQuery"){
      el.addEventListener("input",function(){doSearch(el.value);});
      return;
    }
    if(el.tagName==="SELECT"){
      el.addEventListener("change",function(){S.form[f]=el.value;render();});
    } else {
      el.addEventListener("input",function(){S.form[f]=el.value;validateBtn();});
    }
  });
  validateBtn();
}
function validateBtn(){
  var btn=$("bn");if(!btn)return;
  var ok=true;
  if(S.mode==="new"||S.mode==="solo"){
    if(S.step===0)ok=S.form.betName&&S.form.role&&S.form.summary;
    else if(S.step===1){
      if(S.mode==="solo")ok=S.form.audience&&S.form.regulatory&&S.form.financial&&S.form.spec&&S.form.rollback&&S.form.domain&&S.form.test&&S.form.verify;
      else if(S.form.role==="POps")ok=S.form.audience&&S.form.regulatory&&S.form.financial&&S.form.spec;
      else if(S.form.role==="SWE")ok=S.form.rollback&&S.form.domain&&S.form.test&&S.form.verify;
    }
    else if(S.step===2)ok=S.form.pii&&S.form.contractual&&S.form.firstTime&&S.form.confidence;
  } else if(S.mode==="continue"){
    if(S.step===0)ok=!!S.selectedPartner;
    else if(S.step===1){
      if(S.form.role==="POps")ok=S.form.audience&&S.form.regulatory&&S.form.financial&&S.form.spec;
      else ok=S.form.rollback&&S.form.domain&&S.form.test&&S.form.verify;
    }
    else if(S.step===2)ok=!!S.form.confidence;
  }
  btn.disabled=!ok;
}

render();
</script>
